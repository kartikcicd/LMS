{% extends 'base.html' %}
{% block title %}Edit Member – LibraryMS{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('members.index') }}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0"><i class="bi bi-pencil text-warning me-2"></i>Edit Member</h4>
</div>
<div class="card" style="max-width:500px">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name *</label>
                <input type="text" name="name" class="form-control" required value="{{ member.name }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" name="email" class="form-control" required value="{{ member.email }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ member.phone or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Borrowing Limit</label>
                <input type="number" name="max_books" class="form-control" min="1" max="20" value="{{ member.max_books }}">
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive"
                       {% if member.is_active %}checked{% endif %}>
                <label class="form-check-label fw-semibold" for="isActive">Active Member</label>
            </div>
            <button type="submit" class="btn btn-warning px-4">
                <i class="bi bi-save me-1"></i> Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}

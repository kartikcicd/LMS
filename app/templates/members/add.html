{% extends 'base.html' %}
{% block title %}Register Member – LibraryMS{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('members.index') }}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0"><i class="bi bi-person-plus text-success me-2"></i>Register New Member</h4>
</div>
<div class="card" style="max-width:500px">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name *</label>
                <input type="text" name="name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="+91 9876543210">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Borrowing Limit (max books at once)</label>
                <input type="number" name="max_books" class="form-control" min="1" max="20" value="3">
            </div>
            <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-check-lg me-1"></i> Register
            </button>
        </form>
    </div>
</div>
{% endblock %}

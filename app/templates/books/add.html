{% extends 'base.html' %}
{% block title %}Add Book – LibraryMS{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('books.index') }}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0"><i class="bi bi-plus-circle text-primary me-2"></i>Add New Book</h4>
</div>
<div class="card" style="max-width:600px">
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Title *</label>
                <input type="text" name="title" class="form-control" required placeholder="Book title">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Author *</label>
                <input type="text" name="author" class="form-control" required placeholder="Author name">
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label fw-semibold">Genre</label>
                    <input type="text" name="genre" class="form-control" placeholder="e.g. Fiction, Science">
                </div>
                <div class="col">
                    <label class="form-label fw-semibold">ISBN</label>
                    <input type="text" name="isbn" class="form-control" placeholder="978-...">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Number of Copies</label>
                <input type="number" name="total_copies" class="form-control" min="1" value="1">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Cover Image</label>
                <input type="file" name="cover_image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i> Add Book
            </button>
        </form>
    </div>
</div>
{% endblock %}
